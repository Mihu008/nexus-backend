server:
  port: 8081

spring:
  application:
    name: nexus-ai-backend
  
  profiles:
    active: local

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: postgres
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    mcp:
      server:
        enabled: true
        transport: stdio

google:
  ai:
    api-key: ${GOOGLE_AI_API_KEY}

# LangChain4j Configuration
langchain4j:
  google-ai-gemini:
    api-key: ${GOOGLE_AI_API_KEY}
    model-name: gemini-2.5-flash
    temperature: 0.7
  
  agentic:
    enabled: true
    orchestration:
      mode: declarative

logging:
  level:
    root: INFO
    com.nexus: DEBUG
    dev.langchain4j: DEBUG
